ed&s2=Unsorted&s3=Color+Category+Full)\n\nSort word count!\n\n\\\n? More info about this cube on [GitHub]()\n\nCard eval in draft is mostly straightforward ish\n\nCards do 1 thing\n\nUnsure imp draw, pws, sagas (class, adventure)\n\nFlavour matters how much?\n\nGo through more\n- Tsp war\n- Mrd chk M15 Ori m19-21 fdn EoE bro dmu Dom tdm eld\n\nNo\u002Flater:\n- land station wastes\n\nNombo:\n- counterspells plus suspend, warp, plot\n\n# Inspiration\n\n- Sacred Geometry\n- The Regular Cube\n- Atavus\n\n\n# Careful with the complexity\u002Funfamiliarity budget:\n\u003C\u003C[[!Ragavan, Nimble Pilferer]] [[!Loyal Pegasus]] [[!Prismatic Vista]]\u003E\u003E\nMost cards are either familiar, 'simple', or both (avoid complex + unfamiliar).\n\n#### 'Breaking' Singleton\nThis cube started with 30 copies of Prismatic Vista and 3 copies of Ragavan...\n\n**-\u003E\u003E\u003EFixing:**\n\n### Instant speed reactive spells\nThis is where I want to be most careful with card complexity and unfamiliarity, and have the greatest number of copies per card. Because it's hard enough to decide if\u002Fhow to play these spells as it is, doesn't help if you have to reread the cards in your hand...\n\n# Wide power band\n\u003C\u003C [[!Snapcaster Mage]] [[!Force of Will]] [[!Whitemane Lion]] [[!shock|ea653772-a5fe-4416-bef3-fd41133371db]] \u003E\u003E\nBut, (apparent) strongest cards are typically 2-for-1s, 1-for-1s, or 1-for-2s, not snowballing or must-be-answered.\n\n# Most cards simple, lower power level, some wild, weird, game-changing, have to reread, think about, etc\n\n### Especially Global Enchantments\u002FEnchant World and\u002For black cards, and\u002For cards from the 90s\n\n\u003C\u003C [[!phyrexian arena]] [[!sulfuric vortex]] [[!trinisphere]] [[! Double vision]] [[!second sun]]  [[!abundance ]] [[! Mystic forge]] [[!future sight ]] [[! Masticore]] [[! Necropotence]]  [[!tangle wire]] [[! Fact or fiction]] [[! Intrude on the mind]] [[!sneak attack]] [[!proft's eidactic memory]] [[!braids, cabal minion]] [[!standstill]]\u003E\u003E\n\n\n# Mulldrifters, not Baneslayers or 'feel-bads'\n(Incremental advantage, safe, not must-be-answered, swingy.)\nNot why I call 'feel-bads':\n- Big swings: wraths\n- Hand hate: can make comebacks impossible, don't like revealing this hidden info\n\n# Types of cards I dislike\n- Tutors: makes you see power outliers more often... \u003C\u003C\u003C\u003E\u003E\u003E\n- Defensive focus: deathtouch on 1\u002F1s, walls, can only target tapped\u002Fattacking\n\n\\\nCards do just 1 thing?! (Like sacred geometry)\n\n\n# Ratios\n\n540\n- 6 sealed 90\n- 1 copy rarer\u002Fspecial\n\n\n# Lands\n\n- 4 Prismatic Vista per: 4 x 12 = 48\n- very limited other lands\n\n\n# Cover image top candidates\n\nAbundant Harvest?\n\u003C\u003C[[!Walker of the Grove|e2675b8b-a321-4982-b1d9-5c55d27b9bfd]] [[!Brainstorm|9ff71d13-c4b7-4125-ab10-db4abbb7a074]]\u003E\u003E\nWalker of the Grove: [mor-138] [uma-191]\nBrainstorm: [mmq-61] [cmd-40]\n\nCriteria:\n- Clean, elegant, simple?\n- PW duel\n- Strategy\n- Classic, iconic\n- Fun?\n- Has to be in the cube?\n\n\n[Cover image ideas (Scryfall)](https:\u002F\u002Fscryfall.com\u002Fsearch?q=%28kw%3Aevoke+%28mulldrifter+s%3Alrw+zz+or+nevermaker+s%3Amor+zz+or+solitude+cn%3A32+zz+or+reveillark+s%3Amor+zz+or+walker+s%3Amor+or+dawn+s%3Alrw+zz%29+or+march+of+otag%3Acycle+zz+or+%21boomerang+or+%21gush+s%3Ammq+or+%21soothsaying+or+%21misdirection+s%3Ammq%2Csld+or+loyal+pegasus+s%3Abng+or+tolarian+acad+s%3Ausg+or+banish+light+zz+or+%22cast+out%22+zz+or+%21bushwhack+zz+or+edge+autumn+zz+or+ragavan+%28s%3Amh2+or+s%3Amul%29+zz+or+forked+bolt+zz+or+lightning+axe+zz+or+%21brainstorm+s%3Ammq+or+%21unsummon+s%3Alea+or+%21counterspell+zz%29+date%3Cfin+prefer%3Aoldest+include%3Aextras&unique=art&as=grid&order=edhrec&dir=asc)\n\n\n\n# Extra\n\n[[!Odric's Outrider]] \n[[!Ember Beast]]\n[[!Kavu Titan]]\n","defaultFormat":-1,"priceVisibility":"pu","defaultStatus":"Not Owned","id":"3b1192ba-3100-424a-bfa0-b43b240b311a", tag:core"}]}],"multiples":false}],"keywords":["vintage","the","elegant","cube","v5220","japahn"],"dateLastUpdated":1774488602689,"defaultSorts":["Color Category","Types-Multicolor"],"cardCount":866,"description":"The Elegant Cube aims to be a format that is, above all, fun.\n\n* **Accessible**: The cube should be fun for new players, who need a forgiving draft section and don’t know what most cards do.\n* **Deep**: The cube should be fun for veteran players and reward their skill and knowledge of the game. The cube should create drafting and especially gameplay situations in which decisions are interesting and ambiguous.\n\nThe Elegant Cube is a \"main cube\", which brings in other concrete goals:\n\n* **Comprehensive**: The cube should offer a sample of all that Magic has to offer: card types, mechanics from various blocks, decks ranging from good-stuff to archetypes, fast decks, slow decks.\n* **Replayable**: The cube should offer significantly different experiences depending on the deck that was drafted. It should also have a large number of different \"decks\" to be drafted.\n\n#### The Power and Speed Axes\n\nThe Cube's foundation is a relatively **low power, slow environment** in which games are decided by small incremental advantage. Constructed comparisons are Invasion\u002FOdyssey and Kamigawa\u002FRavnica standard.\n\nAt this speed and power level, there is a broader variety of viable card inclusions, archetypes, and ways in which archetypes can be constructed. The slower speed coupled with curbing of snowbally effects increases gameplay agency by creating fewer non-games.\n\nThreats are much weaker than contemporary constructed to maintain the slow speed. Board wipes are powerful, and spot removal varies in power level and is not particularly scarce or plentiful. Attrition is high, but aggro is offered tools to be resilient and exert sustained pressure.\n\nThe slow speed also means (most) planeswalkers and other cards that generate value over time are disproportionately more powerful, so these cards are considered above the power band even though they aren't \"too fast\".\n\n#### The Synergy Axis\n\nThis cube **rewards synergy, but does not mandate it**.\n\nSimply picking generically useful cards in two colors should create a functional deck.\n\nMacroarchetypes (aggro, control, midrange, aggro-control) are a second layer of possible decks that are a little harder to build, but have a slightly higher ceiling.\n\nMicroarchetypes (like artifacts or lifegain) come in various [archetype shapes](https:\u002F\u002Friptidelab.com\u002Fforum\u002Fthreads\u002Farchetype-shapes.2022), which vary in difficulty to build and linearity. Tribal decks are mono archetypes and linear to build, though they don't have as high a density of enabler that the whole deck can be tribal. The deck has to be complemented by support cards and usually a support color.\n\nMost other microarchetypes are broader, not following the typical 10 pair archetype structure. Drafting 2- or 3-color decks is the norm, and the same microarchetype can be drafted in different color combinations.\n\nList of microarchetypes:\n- {W}{U}{B}{R} Artifacts\u002FEquipment (tetra archetype)\n- {W}{B}{R}{G} Tokens\u002FSacrifice (tetra archetype)\n- {U}{B}{R}{G} Madness\u002FGraveyard (tetra archetype)\n- {W}{B}{G} Counters (triangle archetype)\n- {W}{U}{R} Spells (triangle archetype)\n- {W}{B} Lifegain (pair archetype)\n- {W} Humans (mono archetype)\n- {U} Wizards (mono archetype)\n- {B} Zombies (mono archetype)\n- {R} Goblins (mono archetype)\n- {G} Elves (mono archetype)\n- {R} Burn (mono archetype)\n- {G}{X} Ramp (pivot archetype)\n\n#### The Complexity Axis\n\nCard selection takes into account how simple a card is to grasp, which is a combination of its elegance and resonance. Drafting a pack should feel exciting, not overwhelming.\n\nThe number of mechanics is not restricted, however, leading the cube to have a very large number of different mechanics - though all of them have reminder text in the card, in the spirit of \"the cards do exactly what they say\".\n\n#### The Agency Axis\n\nThe most recent shift in the Elegant Cube is a focus on player agency, something that was missing in recent iterations are focused on lowering complexity. I wrote [The Art and Science of Giving Choices (part 1,](https:\u002F\u002Fcubecobra.com\u002Fcontent\u002Farticle\u002F6090e6e2a92ae8104cffc78f) [part 2](https:\u002F\u002Fcubecobra.com\u002Fcontent\u002Farticle\u002F609dcaf8028ce9104b067ac3)) on the subject.\n\nA slow speed goes a long way to spread the weight of the outcome of the game between many decisions. Card choices are made with the slow speed in mind, and favoring recursion, resilience and mana sinks helps with maintaining tension over time.\n\nThe speed is not low enough though that there aren't tempo vs card advantage tradeoffs, though. Fast decks will still exert early pressure and slower decks will have to choose between long-term development and short-term safety.\n\nCards are chosen with agency in mind, balancing this need with complexity. Alternate modes, low mana curves and sequencing and timing tensions guide card selection.\n\n#### The Deck Variety Axis\n\nPacks 1, 2 and 3 are respectively made of 13, 14 and 15 cards from the Core module (cards with \u003E80% chance of being in the draft) and 2, 1 and 0 cards from Occasional Module (cards with \u003C10% chance of being in the draft). Cube Occasionals provides variety while the Core module provides cohesion. See [Cube Occasionals](https:\u002F\u002Friptidelab.com\u002Fforum\u002Fthreads\u002Fembrace-the-chaos-cube-occasionals.3134).\n","defaultFormat":0,"priceVisibility":"pu","defaultStatus":"Owned","collaborators":[],"id":"5dbb7cd2c67d7070936b6428","views":[{"name":"Mainboard","displayView":"table","boards":["mainboard"],"defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]},{"name":"Maybeboard","displayView":"table","boards":["maybeboard"],"defaul {"name":"Mainboard","boards":["mainboard"],"displayView":"table","defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]},{"name":"Maybeboard","boards":["maybeboard"],"displayView":"table","defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]},{"name":"Basics","boards":["basics"],"displayView":"spoiler","defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]}]},{"date":1769383370111,"shortId":"synergy","featured":false,"basics":["ad8b77cf-b53e-4da3-9c27-3851b7b25a98","4c0ad95c-d62c-4138-ada0-fa39a63a449e","65a3c27f-6b15-49b6-ac89-36cfb79b3b54","ccd3afb3-5574-4f2d-adbe-969a428f1c63","cb3ac778-fb45-4fd3-a9af-8a0791f833e8"],"formats":[],"keywords":["vintage","caleb","gannons","powered","synergy","cube","gannoncd"],"dateLastUpdated":1769383370111,"defaultSorts":[],"cardCount":540,"description":"This is a vintage cube designed with the intention of maximizing fun, interaction and value. The goal is to have highly synergistic and flexible options to allow the player to chase after a variety of exciting decks, while ensuring that most of the \"value engines\" are easy to interact with so that no matter the matchup it feels like both players have a chance. \n\nI have some in-depth articles about this cube which you can find on my blog. You can find the overview, which has links to descriptions of the specific archetypes [here.](https:\u002F\u002Fcalebgannon.com\u002F2022\u002F03\u002F08\u002Fintroduction-to-my-powered-synergy-cube).\n\n\n\n\n\nWhile there are a few two card combos, the major focus was on creating value engines and 3+ card combos. This means aligning cards that play very well together but don't necessarily win, which I find more fun and lead to more interactive games as well as great comeback stories (staring down an opponent with Gitrog monster and molten vortex in play with life from the loam in their graveyard certainly isn't a great position to be in, but it is possible to beat and a lot more interesting\u002Ffun than a reanimated Iona. At least to me :).\n\nTo facilitate that, I have removed a lot of the includes that you might expect in a vintage cube. Most of these are planeswalkers (oko, t3feri, ashiok) which were obviously good, but didn't lead to fun or interactive gameplay to me. I also needed to create an incentive for the players to actually draft these synergies, so I have also removed a lot of the cards that are just independently capable of winning a game on their own. I make the distinction here between powerful enablers and win conditions; black lotus is an incredibly powerful enabler but it cannot win the game on its own. Oko is the opposite, you could win an entire game just by casting a single oko. I want players to have to craft their own engines to take them to victory rather than relying on casting as many broken cards as possible.\n\nSome notes: There are quite a few cards in this cube that have different roles than you might expect out of a traditional vintage cube. Tinker is probably the most different. There are no \"Oops I win\" things to fetch up, its rather a really efficient tutor to find synergy pieces like KCI, aetherflux, sword of the meek or lotus bloom. It can also grab things like golos or birthing pod :) Think of it how you would crop rotation, instead of natural order.\n\nMany of the archetypes are obvious, but I'll explain some of the more exotic builds here. \n\nSecond sunrise\u002FFaith's reward: These cards are a lot better than they might seem. There are quite a few cheap artifacts floating around (chromatic star\u002Fsphere\u002Flotus bloom\u002F black lotus etc), as well as cards like squandered resources, sylvan safekeeper and zuran orb to destroy your own lands as needed. You can even use Greater Gargadon or Thopter foundry as sac outlets if you really want to go deep. You can also loop second sunrise by playing dualcaster mage, eternal witness, or ardent elementalist. An easy card to start off a combo with is tinker, which can do something like sacrifice a mox, find a lotus bloom and start the combo loops. There are plenty more ways you can make these cards work, I'm just excited to see what creative combos you come up with.\n\nWith all the cheap artifacts, Glissa the traitor is an easy inclusion. One of my pet cards and criminally underrated, Glissa can really go deep with the likes of walking ballista, executioner's capsule, ratchet bomb, engineered explosives while also being really fun if you're lucky enough to have a black lotus.\n\nAlso, white is now the supporting color for artifact aggro. I love cards like arcbound ravager and cranial plating, so being able to draft a deck with them in it is really fun for me! Plus this replaced the standard mono white aggro that was criminally under-drafted in the standard vintage cube. Look for mishra's workshop or tolarian academy to really power up this deck! It also slots really nicely into the next archetype...\n\nKrark-Clan Ironworks. This card is an incredibly strong engine when paired with cards like myr retriever, junk diver and scrap trawler. You can sacrifice them in order to generate infinite mana and if you have any other artifacts lying around probably draw your whole deck, do infinite damage with walking ballista or even mill your opponent out with a codex shredder.\n\nGreen: It's not ramp?! I was tired of drafting and seeing green be so one note, so green is now a combo-tastic color! With cards like aluren, earthcraft, intruder alarm, fastbond, glimpse of nature, and fecundity there are so many ways to \"storm off\" in green. Casting glimpse of nature with an aluren in play is a really exciting experience, especially once you hit a shrieking drake or whitemane lion. Elves are a natural supporting archetype for this. You can draft glimpse elves, beatdown elves or anything in between! (paradoxical outcome + aetherflux reservoir elves, phyrexian altar + fecundity elves, even second sunrise + blood artist carrion feeder elves, there are a ton of options).\n\nThere's even more though, green and white are the main supporting colors for all the persist combo loops. Combine a card to undo the persist like melira with safehold elite and altar of dementia and you can remove your opponent's whole library!\n\nThere are SO MANY MORE combos here than I've mentioned. The whole goal of this cube is to promote creativity in drafting and deckbuilding. If you discover or draft any combos that are particularly sweet, I'd love to hear about them!  ","defaultFormat":-1,"priceVisibility":"pu","defaultStatus":"Owned","id":"5fab13510efe0d1071b87fae","owner":{"patron":"null","imageName":"Ambush Viper","followedCubes":[],"defaultPrinting":"first","dateLastUpdated":1771778835177,"roles":[],"autoBlog":false,"usernameLower":"gannoncd","followedUsers":[],"disableAnimations":false,"dateCreated":1765942947638,"cubes":[],"following":["5e627f4f357b4a27e178ee54","5e6fab3140eaf0158efca5c5","5f0dad1529c0e22e5fcc640d","5f94455f56de12418c534e48","5dc079307f2a8b2c173d49f9","5ed9cf0a620f591071e09710","5d3ed7b047586d63776acbe4","5da3f6cd1c493322225b77b9","5dc1c0822d74d83ed51fd48c","5f6f3805190df80fd8ec6380","5e42076e9814f17ed8533d53","5d92c8220e23356b18d64ea5","5eb39831dc9aa61034f38100","5dc18eae53237824a6e60a4f","5fd6839e26aa1e1034db3a48","5feb33e20d076b104860d8be","5d3317050fb15f3a872f9460","5fb098e3456c91566b5af8f4","5d752e638f152803feae2b85","5e66dd2836d79c1b2370fc90","5e5d9d8c4e778f6d0803a811","5e9de4c07db2a31073de4e62","5d885ec6d5242a0b000e0ee4","608894af5e80c367c316c36d","5dfa4e152289165551985c9f","5ec03d87acf42148a144b223","5d542b379f26622158b3ad1a","5faeebaf456c91566b31ed34","5dec020c6649694114df82f8","5d3f71e4d1bbf667dd9d4240","618dee2512ac70104b64209f","6061d11fea056a1043134486","60fcb3b1cbd0fc11a74e2430","605c827833890f11d478e3ea","5ee7b4f8f09bcd0f5797c655","60fa04b208b0a5103baedeb0","6149dabefeaa454763cd1821","5ec2535d6c26474a6cc0a872","605228054e089f1067ee19ff","5dc092ff7f2a8b2c173dab00 ","629bf9e8-9ee5-43e7-a48b-38480783cf74","63044ccb0d73e00f6c960bdc","5edf9133-e659-4784-8ba2-b2e343d6f210","5dbe063d44e9cb7a6c83264f","1feb1277-d245-47ab-8be6-892823397545","06d7a7c3-47a3-4d80-8757-6226917d6997","63094a8474620e6baad3315d","60f7b0bdc1e9591b251ddba5","78420dac-1b2b-4b7a-b394-694373d4a150","04ac5798-198b-475c-a73c-a7ad1087cab9","5ed73cecd26e381019687f74","a245aee4-f1f1-4fa3-9901-8909933c04b4","ca931337-9a48-40d9-989f-f3377baff648","c0d2d1e0-0a28-4031-bf49-afac5ddc0f98","5f182467-c839-4f66-ae15-f51ada0e5e0c","3581f2f3-708c-41a0-949d-581796d6d07b","99f04ce8-5278-41ad-9986-334aa814dfce","6aa3b4a8-ad3a-4469-a0c9-59fa7508d4df","6066c4f8d60d21105ef0a31a","fd8573d4-6b67-4c9b-8ec5-81d413e3484b","3728cb31-5946-4f73-b593-cd716cf82a31","39f0900c-b4c3-4366-8f0b-69c6953c3b93","b8666fd6-6caf-48c5-a21e-7174c36a0c9a","7013b996-da8f-47a9-a697-64aebfe9400a","5e19fa399489167a0ae1401f"],"name":"Caleb Gannon's Powered Synergy Cube","collaborators":[],"image":{"uri":"https:\u002F\u002Fcards.scryfall.io\u002Fart_crop\u002Ffront\u002F5\u002F5\u002F553fb946-2706-475b-89f9-e4355ec9ea2b.jpg?1654566420","artist":"Nils Hamm","id":"553fb946-2706-475b-89f9-e4355ec9ea2b","imageName":"march of otherworldly light [neo-28]"},"views":[{"name":"Mainboard","boards":["mainboard"],"displayView":"table","defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]},{"name":"Maybeboard","boards":["maybeboard"],"displayView":"table","defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]},{"name":"Basics","boards":["basics"],"displayView":"spoiler","defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]}]},{"date":1768936410680,"shortId":"andymangold","featured":false,"basics":["51b0dd0f-8ad8-4292-9df6-7b28ab4605e3","189a09b8-46d2-4ef6-b7cc-9e510d1ea0b8","7aa97b25-1ea0-4351-ab9f-f06c8bb4d044","e1e88b41-7ae5-40fc-8947-5f5aa03388be","0b741c86-a563-4180-a857-7850de6ee366"],"formats":[],"keywords":["legacy","bun","magic","cube","andymangold","vintage","unpowered","360","fair","eternal","legacy+"],"dateLastUpdated":1768936410680,"defaultSorts":["Color Category","Types-Multicolor"],"cardCount":360,"description":"## The Bun Magic Cube is an eternal, 360 card cube named after my local playgroup. It’s an efficient, low-curving environment designed to explore the limits of fair Magic — decks that compete on the tempo and value axes and cover the aggro → midrange → control spectrum.\n\n-------\n\nI document my evolving design philosophy piecemeal with a thorough [changelog](http:\u002F\u002Fcubecobra.com\u002Fcube\u002Fblog\u002Fandymangold) and discuss Cube design more broadly every week on the podcast [Lucky Paper Radio](https:\u002F\u002Fluckypaper.co\u002Fpodcast\u002F).\n\n-------\n\n### History\n\nThe Bun Magic Cube was born in December of 2016. It was the first cube in my local playgroup, 'The Bun Magic Kitchen Table Pro Tour', from which it takes its name. It began as an attempt to reproduce many aspects of the Magic Online Vintage Cube which I had fallen in love with watching LSV's draft videos on YouTube. Over time, the cube evolved alongside my relationship to the game — I got heavily invested in Magic through playing Commander, and cube draft became an outlet for my more competitive nature. As a spectator of eternal constructed Magic, the current iteration of the Bun Magic Cube is a venue to draft lean, efficient decks akin to fair strategies in Legacy.\n\n### Gameplay Goals\n\n\u003E \"Small games; big decisions.\"\n\n- **Decision Rich** — Players get are presented with important, strategic choices starting from the earliest turns of the game.\n- **Lean** — Decisions with marginal strategic impact are minimized and games are relatively short. Quality of decisions is more important that quantity: games hinge on a handful of high-impact decisions as opposed to many 51\u002F49, \"small edge\" choices. Sprawling board states with lots of accounting and potential for overlooked information are eschewed. Another way to describe this goal is with [Sam Black's definition of \"small games\"](https:\u002F\u002Farticles.starcitygames.com\u002Fmagic-the-gathering\u002Fselect\u002Felvish-visionary-vs-elderfang-disciple-the-nature-of-card-advantage\u002F).\n- **Interactive** — Decks are non-linear and must adjust their strategy and sequencing in each match and game depending on their opponent's deck. The tempo of the game and impact of strategic choices is a result of the interplay between both decks. No parallel solitaire!\n- **Diverse** — Decks are not prescriptive. Players are encouraged to combine cards in new and unexpected ways.\n\n### Emergent Design Patterns\n\nThe following design choices have emerged from the gameplay goals stated above:\n\n- **A high density of removal, countermagic, and hand hate**, which are fundamentally interactive and force their casters to decide where and how to use them while simultaneously limiting board complexity and promoting smaller games.\n- **A very low mana curve**, which allows for double-spelling earlier in the game and forces players to make decisions about their sequencing by offering them many different options for what to do with their resources in a given turn.\n- **A high density of cantrips and card selection**, which minimizes the number of games decided by variance, contributes to meaningful decision density, and allows players to adjust their strategy on the fly.\n- **Aggressively sized creatures**, which lead to shorter games, smaller board states, and more trades in combat.\n- **Minimal game-prolonging effects, like lifelink**. Cards are chosen which help decisively end games rather than draw them out.\n- **No non-interactive threats**, which limit decisions by both players and often lead to linear play patterns.\n- **A variety of top-end threats**, (as opposed to interchangeable cards such as multiple [[Rabblemaster|Goblin Rabblemaster]] variants or generic, token-producing green planeswalkers) which contributes to a diversity of decks and playstyles.\n\n### Power Level\n\nMy chosen power level is influenced by my desire to play with specific, personally beloved and iconic cards, such as [[Thalia, Guardian of Thraben]], [[Snapcaster Mage]], [[Dark Confidant]], [[Dreadhorde Arcanist]], [[Titania, Protector of Argoth]], [[Kroxa, Titan of Death’s Hunger]], [[Umezawa’s Jitte]], and [[Rishadan Port]]. I also aim to minimize the disparity between the least and most powerful cards in the cube. I believe a flatter power level leads to more nuanced draft picks and a broader diversity of decks in addition to reducing the number of games decided by players drawing cards of different raw power levels. These two factors combined substantially narrow the pool of viable cards for this environment — only the upper crust of Magic’s most powerful and efficient cards are considerations.\n\nEven though power level is an important factor in which cards are included, the Bun Magic Cube embodies specific gameplay patterns I’ve explicitly chosen rather than blindly power-optimizing. There are many powerful, viable cards that are intentionally excluded, including but not limited to cards that:\n\n- provide their caster an outsized advantage with minimal or no deck building cost\n- discourage interactivity or limit decision making\n- are likely to unnecessarily prolong games or encourage board stalls\n- have narrow or non-interactive counterplay\n- contribute to linear, non-interactive strategies\n- have a very polarized matchup spread\n- cheat mana costs\n- are too similar to other cards included in the list (as decided purely subjectively by me)\n- introduce complexity that does not contribute to strategic depth\n\n### Restrictions\n\nThe Bun Magic Cube is singleton with the exception of fetchlands and shocklands, of which I run two and three full cycles, respectively. I avoid cards from un-sets, Mystery Booster playtest cards, and conspiracies. I own this cube in paper, with no proxies, so in rare occasions budget is a limiting factor. Beyond that, my card choices are unrestricted. \n\n### A Note on Mana Fixing\n\nRelative to the average Cube on Cube Cobra, I include a very high density of fixing lands. This density has been carefully calibrated with the goal of allowing players access to two and three-color manabases that can compete with the consistency of mono-colored decks. The increased number of fetch lands impacts the effectiveness of delve and escape threats, cards like [[Wrenn and Six]], and landfall payoffs such as [[Lotus Cobra]] and [[Field of the Dead]]. Four and five color decks are occasionally possible, but far from a dominant strategy given the strength of aggressive decks in the Bun Magic Cube and the life loss from an extensive fetch\u002Fdual manabase. For more information, read my article [\"How many lands should you include in your Cube?\"](https:\u002F\u002Fluckypaper.co\u002Farticles\u002Fhow-many-lands-should-you-include-in-your-cube\u002F). ","defaultFormat":-1,"priceVisibility":"pr","defaultStatus":"Owned","id":"5d39ce4b8472c42aab0b61c2","owner":{"patron":"60cf5d5c654a381028e4c109","imageName":"morophon, the boundless [cmm-1058]","followedCubes":["5ded0b812d6cd435927a6cfa","5d5ddbd1107a72730e2a1873","5dfe90c62c95325be7630fb9","5e6803803da89418a826c7d4","5dc09316845516168633e492","5fae85ff8459ff65ae3572c3","5e173b541bd612387d816231","5ecd72cf4022a8067a2bd959","5d8924a36754cf19f0c4e29b","5dd1ec1cbd6be86b72c9c832","5e9a38afb691a2104a7a5065","5fd100d2f8ccc5103b42bd5d","5f5d768ced6023105164a65f","5e30ebb57543871cbed254de","5fd7e4c067f5213e0d8e3a0c","604015e8f8e7e0104087722b","5db72d91d4a35c1294819945","5f131969415026108a922137","60611116691176104d9baadd","5d8c76816800702babe53b6a","6119178e0e69cc1022400d9e","60e08b337623a5575c87d7a6","62c4a620f9e6860f6fd1a87b","62984dc7875a570ff5afeb53","6107e410842291103d7a31cd","60a4217fb6771d105f798bc0","63695fdae3f4d024cc696440","631e6551a74dc47f6602b552","6393be801940e31a76a43487","6283 a5cc001b","613a72a7b36fbc353ff211c3","cfa12dd6-7777-48cc-8028-deb22489af09","5ea4d70a74a3591072355ec0","85792fba-e82f-4dbf-bb13-c181264e4ed0"],"name":"Bun Magic Cube","collaborators":[],"image":{"uri":"https:\u002F\u002Fcards.scryfall.io\u002Fart_crop\u002Ffront\u002Fb\u002Fa\u002Fba69864e-aee2-4b9f-821c-8b4a1c05c2ac.jpg?1562271905","artist":"Mark “It’s teh-DEEN” Tedin","id":"ba69864e-aee2-4b9f-821c-8b4a1c05c2ac","imageName":"circle of protection: art [pal04-9]"},"views":[{"name":"Mainboard","boards":["mainboard"],"displayView":"table","defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]},{"name":"Maybeboard","boards":["maybeboard"],"displayView":"table","defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]},{"name":"Basics","boards":["basics"],"displayView":"spoiler","defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]}]},{"date":1773975920635,"shortId":"thepeasantcube","featured":false,"basics":["7a2c8b8e-2e28-4f10-b04f-9b313c60c0bb","44c1a862-00fc-4e79-a83a-289fef81503a","f8772631-d4a1-440d-ac89-ac6659bdc073","f108b0fb-420a-422d-ae85-9a99c0f73169","105b2118-b22c-4ef5-bac7-836db4b8b9ee"],"formats":[],"keywords":["vintage","the","peasant","cube","2023","mateffect","peasant cube","uncommons and commons","artisan","artisan cube","peasant with rare lands","the peasant cube","legacy"],"dateLastUpdated":1773975920635,"defaultSorts":["Color Identity","Types-Multicolor"],"cardCount":540,"description":"\u003E\u003E\u003E ### ***THE PEASANT CUBE*** ### \u003C\u003C\u003C\n\n***\n\u003E\u003E\u003E# TABLE OF CONTENTS\u003C\u003C\u003C\n1. [INTRODUCTION](https:\u002F\u002Fcubecobra.com\u002Fcube\u002Foverview\u002Fthepeasantcube#introduction)\n2. [ARCHETYPES](https:\u002F\u002Fcubecobra.com\u002Fcube\u002Foverview\u002Fthepeasantcube#archetypes) \n3. [TWOBERT MODULE](https:\u002F\u002Fcubecobra.com\u002Fcube\u002Foverview\u002Fthepeasantcube#twobert-module)\n4. [TWO-HEADED GIANT MODULE](https:\u002F\u002Fcubecobra.com\u002Fcube\u002Foverview\u002Fthepeasantcube#two-headed-giant-module) \n5. [SOME THINGS YOU CAN DO](https:\u002F\u002Fcubecobra.com\u002Fcube\u002Foverview\u002Fthepeasantcube#some-things-you-can-do)\n\n***\n\u003E\u003E\u003E# INTRODUCTION\u003C\u003C\u003C\n\nWelcome to [The Peasant Cube](https:\u002F\u002Fcubecobra.com\u002Fcube\u002Foverview\u002Fthepeasantcube). This box has been built after several years trying to play cards that are good by themselves, but also each one should be fun and sinergistic with several archetypes, if possible. Many of the cards I use are powerful commons and uncommons, which win games by themselves sometimes. The idea was to create an environment good for them, but also trying to stay healthy within the Cube. On the [Strix Scale](https:\u002F\u002Fwww.reddit.com\u002Fr\u002Fmtgcube\u002Fcomments\u002Fc2wyta\u002Fthe_strix_scale_shorthand_for_cube_power_level\u002F), this Cube is between a 7 and an 8 for a Peasant environment. \n\nThe only Rare cards here are these:\n- Dual lands (to help each archetype, specially aggro decks, which want untapped duals). You will find  [[Prismatic Vista]], [[Fabled Passage]] and [[Multiversal Passage]], too.\n\nLast, I use any card that has been Common or Uncommon in physical or digital formats, Magic Arena included ([[Honored Hydra|c430a165-3bbf-4ee4-81f7-fe45bd7a201e]], among some others, for example). \n\n***\n\u003E\u003E\u003E# ARCHETYPES\u003C\u003C\u003C\n- {W\u002FU}: Blink \u002F Flyers\n- {U\u002FB}: Reanimator \u002F Control\n- {B\u002FR}: \"Aggrostocrats\" a.k.a. Sacrifice Aggro\n- {G\u002FR}: Monsters Midrange\n- {W\u002FG}: Midrange Tokens \u002F +1\u002F+1 Counters\n- {W\u002FB}: Life Drain a.k.a. Sacrifice Midrange \u002F Recursive Aggro\n- {U\u002FR}: Spellslinging\n- {B\u002FG}: Graveyard Value\n- {W\u002FR}: Aggro Tokens \u002F Power 2 or less \n- {U\u002FG}: Ramp\n\nYou could also try things like these:\n- {W\u002FU}: Tempo \u002F Tap Creatures \n- {U\u002FR}: Tempo\n- {W\u002FB}: Control a.k.a. Death & Taxes\n- {W\u002FR}: Spellslinger\n- {U\u002FG}: Graveyard Value\n- {W\u002FB}: Reanimator\n- {W\u002FG}: [[Kitchen Finks]] Combo\n- {W}{X}: [[Essence Reliquary]]\n- {U}{X}: [[Psychic Spiral]] \n- {B}{X}: [[Joo Dee, One of Many]] \n- {G}{X}: [[The Aesir Escape Valhalla]]\n- {B\u002FG}: [[Insidious Roots]]\n- {R\u002FW}: [[Shadowfax, Lord of Horses]] \n- [[Scurry Oak]] Combo\n- [[Sprout Swarm]]\n\n***\n### {W\u002FU} BLINK\n\n‘Blink’, also called ‘Flicker’, is a deck archetype that temporarily exiles its own permanents and brings them back into play for the purposes of re-triggering their enters-the-battlefield abilities (ETB), getting repeated value.\n\nThe two main components to this archetype are running enough creatures with the text “when this creature enters the battlefield” and cards that allow them to leave the battlefield and return to trigger that effect again. \n\nBy repeatedly blinking such creatures, they are able to accumulate a significant degree of card and mana advantage over other players to easily find and deploy much larger cards with more impactful abilities.\n\n\u003E\u003E\u003E \u003C\u003C[[!Soulherder]][[!Sharae of Numbing Depths]] [[!Mulldrifter|eb6d8d1c-8d23-4273-9c9b-f3b71eb0e105]][[!Ephemerate]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FU} FLYERS\n\nThis deck is pretty straightforward. Sometimes removal and evasion is enough to win games and the Skies gameplan is just that. While it isn’t comboing out or doing degenerate things, the deck can really beat up on opponents that aren’t prepared for it.\n\nJust play evasive flying creatures, backed up with some removal\u002Fdisruption and even some anthems, and the victory should be easy to achieve.\n\n\u003E\u003E\u003E \u003C\u003C[[!Air Nomad Legacy]][[!Cloudblazer|a9c966ab-0d92-4fa7-8a91-1f77089d8fc7]][[!Mist Raven|557b7e56-36f7-489c-a0fe-039c463f8bc5]][[!Beckoning Will-o'-Wisp]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {U\u002FB} REANIMATOR\n\nReanimator is a deck archetype known for putting big and powerful creature cards into their graveyard, then using cheap spells or abilities to return those creatures to the battlefield in order to avoid prohibitive mana costs.\n\nThere are three main components to any reanimator strategy: creatures to reanimate, the spells that reanimate them, and a reliable way of putting creatures into a graveyard, usually looting spells (draw and then discard cards).\n\n\u003E\u003E\u003E \u003C\u003C[[!Obsessive Stitcher|d319c8a2-ae7b-4077-8b11-97937979fed2]][[!Dinrova Horror|7f7918de-71c8-4c46-bde2-f7357767dc08]][[!Striped Riverwinder]][[!Reanimate|bee3dad4-88d8-424c-b3f8-d089b6891fb8]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {U\u002FB} CONTROL\n\nControl decks avoid racing and attempt to slow the game down by executing an attrition plan, outlasting the opponent with counterspells and removal spells. As the game progresses, control decks are able to take advantage of their slower, more powerful, cards. \n\nThe primary strength of control decks is their ability to devalue the opponent's cards. These decks typically get their edge through card advantage, then win the game by doing something more powerful than your opponent.\n\n\u003E\u003E\u003E \u003C\u003C[[!Intimidation Campaign]][[!Baleful Strix|e08e0f5c-3a33-4779-95a9-a89dda146036]][[!Counterspell|8493131c-0a7b-4be6-a8a2-0b425f4f67fb]][[!Ravenous Chupacabra|40d3e58e-f989-4169-9e2c-a66a23170dcf]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {B\u002FR} AGGROSTOCRATS a.k.a. SACRIFICE AGGRO\n \n“Aggrostocrats” decks seek to sacrifice its own creatures, especially many low-cost and\u002For token creatures, to accumulate game-winning benefits. Here, you want to win fast and attack and ping your opponent with everything you have, even when they die.\n\nThis archetype uses a combination of sacrifice outlets and cards that trigger when their creatures enter and\u002For leave the battlefield.\n\n\u003E\u003E\u003E \u003C\u003C[[!Judith, the Scourge Diva|d6fb929c-1b8d-4d1d-aa69-ac6189cd7ebf]][[!Mayhem Devil]][[!Umbral Collar Zealot]][[!Goblin Bombardment|9afd9d51-10b0-402d-9da3-9ce5fabe745c]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {G\u002FR} MONSTERS MIDRANGE\nIf you like smashing face, then Gruul Midrange is the deck for you. This is a creature based red and green deck that uses bigger, ahead-of-the-curve creatures to overrun your opponents quickly rather than going wide with smaller creatures.\n\nRamp your mana on your first turns to cast as soon as possible your big threats. You may also opt to be a little bit more aggressive deck playing cheap red creatures, cleaning the board for your beaters with burn spells, or dealing those last points of damage to the face.\n\n\u003E\u003E\u003E \u003C\u003C[[!Writhing Chrysalis]][[!Ghor-Clan Rampager|4aae3f29-dde8-4880-b675-75468d53b3f4]][[!Charging Monstrosaur]][[!Spinewoods Paladin]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FG} TOKENS MIDRANGE\nIn The Peasant Cube, {W\u002FR} focuses on having multiple small but cheap creature tokens. Instead, {G\u002FW} wants to have not so many tokens, but much bigger. This is a midrange deck with more threatening creatures.\n\nDeploy your tokens and overrun your enemies with cards like [[Overwhelming Encounter]]. Using +1\u002F+1 counters is also a great way to make all your tokens grow. Make them come in bigger with [[Good-Fortune Unicorn]] or turn them into huge threats with [[Curse of Predation]]. \n\n\u003E\u003E\u003E \u003C\u003C[[!Vitu-Ghazi Guildmage|275a3199-1297-4281-a95c-374bcdc198ce]][[!Veteran Beastrider|cab38f35-b60c-464c-a0b5-9d5f2dc6de7f]][[!Imperial Oath]][[!Rise of the Ants]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FG} +1\u002F+1 COUNTERS\nThis is not the main strategy in these colors, but it's still playable. \n\nTurn your creatures into major threats increasing their power and toughness with as many +1\u002F+1 counters as you could distribute on them.\n\nThis is another midrange deck focused on building a big board presence to overrun your opponents.\n\n\u003E\u003E\u003E \u003C\u003C[[!Diligent Webkeepers]][[!Kitchen Finks|a844d537-df73-422d-a154-f1c6b92d0469]][[!Mighty Mutanimals]][[!Curse of Predation|d7fcfc0b-4674-4cd1-85de-823f4ca8c6c5]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FB} LIFE DRAIN a.k.a. SACRIFICE MIDRANGE\n\nThis deck has a lot of overlap with the Red-Black version but it's not so fast. It's more controlling, and tries to generate more value in terms of life and resources. White provides tons of creature tokens while black brings more and bigger payoffs.\n\nYour lifegain triggers whenever a creature dies will make the difference in most games. \n\n\u003E\u003E\u003E \u003C\u003C[[!Elas il-Kor, Sadistic Pilgrim]][[!Tolls of War]][[!Lingering Souls|09cd56b2-1987-40c2-a436-5f3cbc564f1c]][[!Syr Konrad, the Grim|685faa53-c0b3-4dbb-abd9-bf09067f6f91]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FB} RECURSIVE AGGRO\nThis deck uses graveyard recursion to drive an aggro strategy. You’ll be needing to keep the pressure up at all times with plenty of cheap creatures, while also making use reanimation effects to bring things back into play for one last swing.\n\nTry to emphasise one key aspect of the archetype: you’ll want lots of creatures with mana values three or less. \n\n\u003E\u003E\u003E \u003C\u003C[[!Hero of the Dunes]][[!Graceful Restoration]][[!Recruitment Officer]][[!Unearth|b62abd0c-ec3e-45d7-989d-da269812aeef]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {U\u002FR} SPELLSLINGING\n\n‘Spellslinger’ is a term for decks that focus primarily on instant and sorceries. They often contain a mix of low-cost spells that may be cast in quick succession as well as high-cost, powerful spells that many other archetypes may find difficult to cast. Spellslinger decks often contain similarities to control strategies, though they are not a prerequisite for this archetype.\n\nCantrips, as well as other card draw spells, help your deck maintain a steady influx of instants and sorceries that will produce consistent synergy with other cards in the deck, such as cards with abilities that trigger when instants and sorceries are cast. Cards with Adventure spells are also good here. They provide an instant\u002Fsorcery and \"draw\" you a creature card, witch helps you to have a good balance between spells and creatures. \n\nThese cards that trigger with your spells can provide you with many additional benefits and even may also be your deck’s primary win condition.\n\n\u003E\u003E\u003E \u003C\u003C[[!Third Path Iconoclast]][[!Expressive Iteration|6da813aa-7fca-4e7e-8946-b5a900bba6c8]][[!Rise From The Tides|d6378465-0f28-46b6-8464-ff57b77d50e8]][[!Young Pyromancer|218af707-cc60-407e-af20-e21879a0e902]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {B\u002FG} GRAVEYARD VALUE\n\nDeath is not an end but just a new beginning. Use your graveyard for sweet recursive value. You are setting up an engine to grind out a long game, or dumping things in the yard to use as your second hand.\n\nThis deck is good at not running out of resources. How? By utilizing the graveyard to keep getting back the resources. The opponent can kill your creatures, but you can [reanimate](https:\u002F\u002Fcubecobra.com\u002Ftool\u002Fcard\u002Fe2f1fea1-f008-4bf9-93ae-869ac60aa55c) them. The opponent can stop your spells but you can [regrow](https:\u002F\u002Fcubecobra.com\u002Ftool\u002Fcard\u002Fd771fc5d-b9a1-4637-8241-3f54616b64af) them. No matter what answers your opponent has, this archetype keeps bringing back threats. \n \n\u003E\u003E\u003E \u003C\u003C[[!Honest Rutstein]][[!Rise of the Witch-king]][[!Spider Spawning|c229cbde-f370-4fef-8765-9773d516324a]][[!Timeless Witness|f22c07e2-91d2-4edb-bd2b-cca6d4cefcc9]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FR} AGGRO TOKENS\n\nA token deck focuses on token-producing cards that can create a large number of tokens for a low cost to overwhelm your opponent. This strategy usually take the form of an aggro deck, using a high density of creatures, commonly paired with effects that increase their power, to defeat the enemy with combat damage.\n\nThis can allow you to spend very few cards and resources to establish a much larger board presence than your opponent. \n\nOnce you have assembled a large number of tokens, you commonly use effects that will make those tokens more powerful in combat often with ‘anthems’ (cards that provide a power and toughness boost to each creature).\n\n\u003E\u003E\u003E \u003C\u003C[[!Craig Boone, Novac Guard]][[!Heroic Reinforcements]][[!Descendant of Storms]][[!Goblin Surprise]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FR} POWER 2 OR LESS\n\nFill your deck with creatures that have 2 or less power and start attacking. Smash your opponents swiftly by clearing out their blockers and buffing your little creatures. \n\n\u003E\u003E\u003E \u003C\u003C[[!Arabella, Abandoned Doll]][[!Goblin Trenches|73744225-d432-495e-916d-b18e6d042dff]][[!Militia Bugler|5fe9413b-5702-4998-aed7-d3a1102a8d7e]][[!Irreverent Gremlin]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {U\u002FG} RAMP\n\nHere you aim to cast spells that put additional lands into play, or playing creatures or artifacts that tap for mana as quickly as possible, to cast big creatures. Simple but strong. \n\n\u003E\u003E\u003E \u003C\u003C[[!Biomechan Engineer]][[!Colossal Skyturtle]][[!Mouth of the Storm]][[!Pelakka Wurm|fa150070-80b6-453d-b00f-4462175cac79]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {U\u002FG} ~~FLASH \u002F TEMPO~~ **(NOT SUPPORTED RIGHT NOW)**\n\nThis deck attempts to deploy quick and aggressive threats while protecting them with light permission and disruption long enough to win. You are accelerating your own path to victory while, at the same time, slowing the opponent. \n\nThis can be achieved by playing multiple efficient, impactful cards each turn, outpacing your opponent by volume. You can force their mana to go to waste each turn, denying them meaningful ways to spend it or simply countering everything they do, hopefully while your cheap impactful threats get the job done on an empty board.\n\nControl tries to slow the entire tempo of the game to a crawl, whereas Tempo decks try to expedite their victory much earlier in the game. Think of Tempo decks, in a way, as Control decks that try to do their winning during the early stages of the game, rather than in the later stages.\n\n\u003E\u003E\u003E \u003C\u003C[[!Frilled Mystic]][[!Scuttling Sentinel]][[!Brineborn Cutthroat]][[!Wolfir Avenger]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FU} TEMPO \u002F TAP CREATURES \n\nSlow your opponent while making pressure with your creatures. That's what you want to do with this deck. [[Sharae of Numbing Depths]] is also a good build-around creature too, as you will find some good effects that tap your opponent's creatures to open the path to your victory.\n\n\u003E\u003E\u003E \u003C\u003C[[!Reflector Mage]][[!Sharae of Numbing Depths]] [[!Faebloom Trick]][[!Reprieve]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {U\u002FR} TEMPO\n\nJust like the {U\u002FG} Flash deck, you  try to win playing cheap threats and go for the win protecting them, while disrupting your opponent's plans with efficient spells that grant you advantage for your board. \n\n\u003E\u003E\u003E \u003C\u003C[[!Sprite Dragon]][[!Balmor, Battlemage Captain|0b45ab13-9bb6-48af-8b37-d97b25801ac8]][[!Electrostatic Infantry]][[!Memory Lapse|30202613-d05f-4f47-af97-d0b75ccac293]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FR} ~~EQUIPMENTS~~ **(NOT SUPPORTED RIGHT NOW)**\n\nAggressive decks have a very low mana curve. If the game isn’t finished quickly, your creatures become outclassed. Here is where Equipment really shines. Suddenly your utility and weaker creatures trade up.\n\nWhile this deck can be assembled at any color combination, you will find the best payoffs in White and Red.\n\nFind Equipments (most of them are colorless) and attach them into your creatures. Any creature may carry your weapons, but some wear them better than others. Creatures with evasion keywords like Flying and Menace, First Strike and Double Strike, Lifelink and Ward shine in this job. \n\n\u003E\u003E\u003E \u003C\u003C[[!Koll, the Forgemaster]][[!Akiri, Fearless Voyager|fa135775-abcd-4a21-abb7-3aeb5a39df28]][[!Danitha Capashen, Paragon]][[!Rabbit Battery]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FB} \"DEATH & TAXES\" \n\nIt may not be accurate to refer to Death & Taxes to this archetype in this Cube. Maybe Orzhov Midrange is more approppriate for it, as this one typically is a creature based control deck that plays a very disruptive game. \n\nIt is a very proactive deck that drops early creatures that disrupt opponent's resources (killing their creatures, attacking their hands, taxing their spells...) and starts slowly attacking, pinging, or draining the opponent out. \n\nYou may also add blink creatures like [[Flickerwisp|f6cccf30-2025-49bb-9b1e-240bbef03f27]] to maximize your ETB creatures.\n\n\u003E\u003E\u003E \u003C\u003C[[!Elas il-Kor, Sadistic Pilgrim]][[!Tax Collector]] [[!Thought-Stalker Warlock]][[!Ravenous Chupacabra|a4dfbac0-1849-41c5-853a-1fee108d0b01]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {U\u002FR} DRAW TWO\n\nDrawing cards (card advantage) is one of the most powerful things you can do in Magic. It lets you look for solutions to the opponents’ threats, as well as find your own key cards to win the game. \n\nThe Draw Two is a deck that slowly creates its advantage doing something so simple as drawing cards. \n\nYour payoffs here are the standouts for winning, so look for potential triggers for your payoff cards every turn. Cantrips, looters, creatures that draw cards when enter the battlefield... \n\n\u003E\u003E\u003E \u003C\u003C[[!Improbable Alliance]][[!Mischievous Mystic]][[!Scrapwork Mutt]][[!Mulldrifter|d9fb2f2b-ed82-4461-9013-490e8bca89f8]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FR} SPELLS\n\nAnother deck that tries to win fast, with cheap creatures and spells. Playing cards with Adventures is a great form to play this deck, as each of those cards offers you a good creature and an instant or sorcery in a single card. [[Cheeky House-Mouse]], [[Faerie Guidemother]], [[Ardenvale Tactician]], [[Rimrock Knight]] and [[Hearth Elemental]]. Add removal and some tokens and try to win with [[Rally the Peasants|3b300df0-c867-41e6-a1fd-fe547ed3dc51]], for example. \n\n\u003E\u003E\u003E \u003C\u003C[[!Heroic Reinforcements]][[!Rimrock Knight]][[!Cheeky House-Mouse]][[!Seeker of the Way|e9e3cb28-d318-4d5d-b5bf-1ea7c6249a89]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {U\u002FG} GRAVEYARD VALUE\n\nIn a similar way to the [[Spider Spawning|c229cbde-f370-4fef-8765-9773d516324a]] deck in {B\u002FG}, you can try to replicate that strategy in {G\u002FU} with [[Vilespawn Spider|58901777-f8bf-450b-acf8-d60a73c3322f]]. Blue gives you tons of card selection effects, so you may discard something that you can recover later with [[Eternal Witness|ee7d035f-184f-4067-876a-1d26cb8d3fa2]] for example. Green has several ways to mill cards, and some spells with flashback to cast from your graveyard. Once you have enough creatures in your grave, play the spider and sacrifice it. \n\nOr you could try to win by surprise with an explosive [[Psychic Spiral]], milling your opponent in a single turn.\n\n\u003E\u003E\u003E \u003C\u003C[[!Vilespawn Spider|6ad9ae64-6526-4747-9b0c-77d113f58c33]][[!Colossal Skyturtle]] [[!Fallaji Archaeologist]][[!Grizzly Fate|004e1457-d951-4029-8bb6-17a290793e79]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FB} REANIMATOR\n\nStock up your graveyard with large creatures with discard and self-mill effects, then bring them back with unhallowed spells. While you bide your time until you reanimate massive threats, stall out your opponents with white-black's removal suite.\n\n\u003E\u003E\u003E \u003C\u003C[[!Shroudstomper]][[!Graceful Restoration]] [[!Unburial Rites|e639e1cc-9d6d-4c96-95a5-6ab8554889ce]][[!Bitter Triumph]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {R\u002FB} ~~GOBLINS~~ **(NOT SUPPORTED RIGHT NOW)** \n\nThis is not a true archetype, but maybe you are lucky gathering some pieces of the deck. There are a good amount of Goblins in the cube, specially in red. They want to play aggro, but the deck is not so different of a sacrifice archetype, as you could deal the last points of damage sacrificing all your creatures to finish the game.\n\n\u003E\u003E\u003E \u003C\u003C[[!Murderous Redcap|acadf575-2076-4f0c-b66e-994898adf375]][[!Sling-Gang Lieutenant]][[!Battle Cry Goblin|ba41ec1b-e631-4882-b897-df26e26ada04]][[!Heirloom Blade|6bbf8881-0e23-4745-95cd-cec18084e4b1]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W}{B}{R}{G} PERSIST COMBO **(NOT FULLY SUPPORTED RIGHT NOW)**\n\nPersist Combo is a three-cards combo that works with the fact that with any card that puts a +1\u002F+1 counter on a creature on the board ([[Anafenza, Kin-Tree Spirit|1717da7b-9e87-4694-873b-abd4e3bcd5e2]], [[Mighty Mutanimals]], [[Renata, Called to the Hunt|2b27e6b2-13ad-42b2-a121-70935913723d]], ~~[[Metallic Mimic]]~~, ~~[[Grumgully, the Generous|b9d50d26-3c44-4c8f-81bb-9093dacfb804]]~~ or [[Good-Fortune Unicorn]]), persist creatures come back every time they die. This makes ~~[[Murderous Redcap]]~~ an instant kill and [[Kitchen Finks]] infinite life, provided you have something that lets you sacrifice creatures at no cost (like [[Carrion Feeder]], [[Goblin Bombardment]] or [[Spawning Pit]] among others).\n\nThere are some other persist creatures in the Cube (~~[[Lesser Masticore]]~~ and ~~[[Putrid Goblin]]~~), but these cards may need a forth piece to win the game, something that pings the opponent when they die (like [[Blood Artist]], [[Marionette Apprentice]], [[Spiteful Prankster]] or [[Mayhem Devil]]).\n\n\u003E\u003E\u003E \u003C\u003C[[!Murderous Redcap|acadf575-2076-4f0c-b66e-994898adf375]][[!Kitchen Finks|a844d537-df73-422d-a154-f1c6b92d0469]][[!Grumgully, the Generous|b9d50d26-3c44-4c8f-81bb-9093dacfb804]][[!Good-Fortune Unicorn]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W}{X} ESSENCE RELIQUARY\n\n[[Essence Reliquary]] is a powerful artifact to build a deck around it. Easily, a true P1p1. \n\nIt combos with many cards in the Cube, especially once you notice it is instant speed (ON YOUR TURN) and can pick up non-creatures.\n\n- Pick up and recast any powerful cast or ETB trigger. [[Guarded Heir]], [[Geological Appraiser]], [[Reflector Mage]], etc. Cast [[Accursed Marauder]] with no other nontoken creatures in play. Or bounce a Room to get repeated value ([[Meat Locker \u002F\u002F Drowned Diner]]).\n\n- Trigger-on-the-stack tricks like picking up a Saga after you get the final chapter ([[The Eldest Reborn]]. Turn [[Priest of the Blood Rite|14db0f35-905b-45c9-a0cc-1c47720380eb]] into a Demons generator dodging the upkeep trigger, or [[Journey to Nowhere]] into a way to exile creatures (with the trigger on the stack), kill tokens, or just move it to a new threat. Or picking up [[Floodpits Drowner]] after activating the shuffle ability.\n\n- Attack with two creatures, pick up the one they block. Or just swing with a [[Mandibular Kite]] \u002F [[Flayer Husk]] and when they trade you can recast it for a new germ token.\n\n- Play your MDFC (modal double-faced card) as a land then pick it up late game. You can even use it as janky color fixing for double pipped cards. Tap, bounce, tap, [[Whirler Rogue|3f2ddb63-e4d0-418e-9ec7-70add0ed06a8]].\n\n\u003E\u003E\u003E \u003C\u003C[[!Essence Reliquary]][[!Geological Appraiser]][[!The Eldest Reborn]][[!Floodpits Drowner]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {U}{X}: PSYCHIC SPIRAL\n\u003E\u003E\u003E \u003C\u003C[[!Psychic Spiral]][[!Fallaji Archaeologist]][[!Resentful Revelation]][[!Eternal Witness|ee7d035f-184f-4067-876a-1d26cb8d3fa2]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {B}{X}: JOO DEE, ONE OF MANY\n\u003E\u003E\u003E \u003C\u003C[[!Joo Dee, One of Many]][[!Reassembling Skeleton|c095b168-bd1a-4375-ab23-6f36a909a167]][[!Lingering Souls|09cd56b2-1987-40c2-a436-5f3cbc564f1c]][[!Hordeling Outburst|81b98d04-937e-47ee-8f97-775c77e33de9]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {G}{X}: THE AESIR ESCAPE VALHALLA \n\u003E\u003E\u003E \u003C\u003C[[!The Aesir Escape Valhalla]][[!Spinewoods Armadillo]][[!Mulldrifter|eb6d8d1c-8d23-4273-9c9b-f3b71eb0e105]][[!Troll of Khazad-dûm]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {B\u002FG} INSIDIOUS ROOTS\n\nA really cool build around card. Golgari decks usually want as many creatures as possible in their graveyards to generate value from there ([[Spider Spawning|c229cbde-f370-4fef-8765-9773d516324a]]) or to return them to the battlefield later ([[Rise of the Witch-king]]).\n\nBut [[Insidious Roots]] enables a beautiful ecosystem where death fuels new life. Here your dead creatures are \"fertilizer\" for your plants. Raise the dead to support a long-game strategy that gives you extra value whenever a creature card leaves your graveyard.\n\n\u003E\u003E\u003E \u003C\u003C[[!Insidious Roots]][[!Seedship Broodtender]][[!Faerie Dreamthief]][[!Earthrumbler]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {R\u002FW} ~~SHADOWFAX, LORD OF HORSES~~ **(NOT SUPPORTED RIGHT NOW)**\n\n[[Shadowfax, Lord of Horses]] is a powerful build-around creature capable of cheating creatures with power lesser than him (remember, power, not mana value). You will find in the Cube many good effects to play for free with Shadowfax. Try to play on it some equipments or +1\u002F+1 counters to cheat more big threats.\n\n\u003E\u003E\u003E \u003C\u003C[[!Shadowfax, Lord of Horses]][[!Combat Thresher]][[!Cloudgoat Ranger|6dfaa74a-0ef0-44bb-b8b5-6d121278b5a2]][[!Meteor Golem|5d096068-0740-4b28-8c05-f5a5b7109ab9]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {W\u002FG} SCURRY OAK COMBO\n\nThere is a combo in the Cube where you can create infinite creature tokens.\n\nWith [[Scurry Oak]] on the battlefield:\n1) Cast [[Rosie Cotton of South Lane]]. \n2) Choose [[Scurry Oak]] with the skill of [[Rosie Cotton of South Lane]]. \n3) Repeat, create infinite squirrel tokens and make [[Scurry Oak]] gain infinite power. \n\nAdd a third piece, like [[Goblin Bombardment|9afd9d51-10b0-402d-9da3-9ce5fabe745c]], to win the game on the same turn.\n\nThe combo also works with [[Scurry Oak]] and [[Mighty Mutanimals]]. Just play Mutanimals after the Oak to start the sequence.\n\n\u003E\u003E\u003E \u003C\u003C[[!Scurry Oak|0fb48c2e-ee0f-4fae-9c22-247870c10d5b]][[!Rosie Cotton of South Lane]][[!Mighty Mutanimals]]\u003E\u003E \u003C\u003C\u003C\n\n***\n### {R\u002FG} SPROUT SWARM (TOKENS)\n\n[[Sprout Swarm]] seems to be a pretty innocuous card, but it's an awesome payoff and also an enabler to build an army of Saprolings with just a single card and close the game. A true one-card engine, as once you control five or more creatures, they help you to cast the card for free. The card is an easy P1p1. \n\nYou may build a deck around it with many cards. [[Renata, Called to the Hunt]]? Good. [[Great Oak Guardian|65d36326-897e-4207-909a-8d1323d6c8e7]]? Nice. [[Thermo-Alchemist|98c79cd4-c084-4c01-beeb-70fb12dd6e69]] or [[Coruscation Mage]], too? That seems like a sweet combo.\n\n\u003E\u003E\u003E \u003C\u003C[[!Sprout Swarm]][[!Renata, Called to the Hunt|2b27e6b2-13ad-42b2-a121-70935913723d]][[!Great Oak Guardian|65d36326-897e-4207-909a-8d1323d6c8e7]] [[!Thermo-Alchemist|98c79cd4-c084-4c01-beeb-70fb12dd6e69]]\u003E\u003E \u003C\u003C\u003C\n\n***\n\u003E\u003E\u003E# TWOBERT MODULE\u003C\u003C\u003C\n\nThe Peasant Cube has also been built to play as a Twobert cube (two-players cube)\n\nThis option was thought for those days when you don't have many people to play with. Just go to **Filter \u003E Filter** and write **Tag:180** to see the cards you have to choose to make the draft\u002Fsealed. \n\nTo draft, just do five packs with 9 cards. You may learn about other draft formats for 2 to 4 players [here](https:\u002F\u002Fluckypaper.co\u002Fresources\u002Fformats\u002F). \n\nSome cards also have a [360] tag, but that's something I never have time to finish, as it requires even more time to mantain. Sorry.\n\n***\n\u003E\u003E\u003E# TWO-HEADED GIANT MODULE\u003C\u003C\u003C \nIn Two-Headed Giant games or 2HG (four players go head to head in a 2vs2 battle). If you look carefully, in the main list there are many cards that are even better in 2vs2 games, with effects that grow exponentially with two opponents. But there is more. In the **Maybeboard section (Display \u003E Show Maybeboard)** you will find a small module with cards that are awesome in those games.\n\nJust add those cards to the cube and enjoy. Or if you prefer, randomly remove the same amount of cards from the main list and add that number of 2HG cards.\n\n\u003E\u003E\u003E \u003C\u003C[[!Grasp of Fate|67d83424-ea52-44f1-bfb7-e877afc2168d]][[!Modify Memory]][[!Arterial Flow]] [[!Noxious Revival|4db5b4cd-3809-4dfe-8b9a-2a25b02e814c]]\u003E\u003E \u003C\u003C\u003C\n\n***\n\u003E\u003E\u003E# SOME THINGS YOU CAN DO\u003C\u003C\u003C\n\n**TRY TO DO THIS** (WORK IN PROGRESS, NEEDS TO BE UPDATED AND REMOVE SOME THINGS)\n- Sentinel's Eyes + Paradise Druid\n- Sentinel's Eyes + Ahn-Crop Crasher\n- Shielded by Faith + Siona, Captain of the Pyleas (and any other creature you control)\n- Oketra's Monument + Whitemane Lion\n- Oketra's Monument + Kor Skyfisher\n- Oketra's Monument + Stonecloaker\n- Soul's Attendant + Whitemane Lion\n- Soul's Attendant + Kor Skyfisher\n- Soul's Attendant + Stonecloaker\n- Adanto Vanguard + Loxodon Warhammer\n- Guardian of the Guildpact + Any Colorless Equipment\n- Lone Rider + Any Equipment Which Increases Power in 2 or more\n- Fiend Hunter + Whitemane Lion\n- Fiend Hunter + Stonecloaker\n- Fiend Hunter + Any Sac Outlet\n- Mesmeric Fiend + Any Sac Outlet\n- Crystal Shard + Evoked Mulldrifter\n- Crystal Shard + Evoked Shriekmaw\n- Crystal Shard + Fiend Hunter\n- Crystal Shard + Mesmeric Fiend\n- Archaeomancer + Ghostly Flicker (+ Peregrine Drake or any ETB creature)\n- Mnemonic Wall + Ghostly Flicker (+ Peregrine Drake or any ETB creature)\n- Eternal Witness + Ghostly Flicker (+ Peregrine Drake or any ETB creature)\n- Goblin Bombardment + Reassembling Skeleton\n- Thoughtpicker Witch + Reassembling Skeleton\n- Pawn of Ulamog + Reassembling Skeleton + Any Sac Outlet\n- Anax, Hardened in the Forge + Reassembling Skeleton + Any Sac Outlet\n- Act of Treason + Any Sac Outlet\n- Crypt Rats + Undying Evil\n- Crypt Rats + Status \u002F\u002F (Statue)\n- Devoted Druid + Blossoming Defense\n- Devoted Druid + Mutagenic Growth\n- Devoted Druid + Vines of Vastwood\n- Devoted Druid + Scale Up\n- Devoted Druid + Become Immense (with delve)\n- Become Immense + Temur Battle Rage\n- Sprout Swarm + Guttersnipe\n- Sprout Swarm + Electrostatic Field\n- Sprout Swarm + Murmuring Mystic\n- Leonin Relic-Warder + Animate Dead \u002F Dance of the Dead + Soul's Attendant or Blood Artist or Marionette Apprentice or Falkenrath Noble or Hissing Iguanar or Goblin Bombardment\n- Fiend Hunter + Oblivion Ring \u002F Journey to Nowhere + Leonin Relic-Warder + Soul's Attendant or Blood Artist or Marionette Apprentice or Falkenrath Noble or Hissing Iguanar or Goblin Bombardment\n- Frilled Mystic + Crystal Shard\n- Frilled Mystic + Temur Sabertooth\n- Frilled Mystic + Eternal Witness + Ghostly Flicker\n- Frilled Mystic + Arqueomancer + Ghostly Flicker\n- Frilled Mystic + Mnemonic Wall + Ghostly Flicker\n- Rhythm of the Wild + Kitchen Finks + Any sac outlet\n- Renata, Called to the Hunt + Kitchen Finks + Any sac outlet\n- Metallic Mimic + Kitchen Finks + any sac outlet\n- Rhythm of the Wild + Murderous Redcap + Any sac outlet\n- Renata, Called to the Hunt + Murderous Redcap + Any sac outlet\n- Metallic Mimic + Murderous Redcap + Any sac outlet\n- Good-Fortune Unicorn + Kitchen Finks + Any sac outlet\n- Good-Fortune U alue","Alphabetical"]},{"name":"Basics","boards":["basics"],"displayView":"spoiler","defaultSorts":["Color Category","Types-Multicolor","Mana Value","Alphabetical"]}]},{"date":1765737404055,"shortId":"regular","featured":false,"basics":["1d7dba1c-a702-43c0-8fca-e47bbad4a00f","42232ea6-e31d-46a6-9f94-b2ad2416d79b","19e71532-3f79-4fec-974f-b0e85c7fe701","8365ab45-6d78-47ad-a6ed-282069b0fabc","0c4eaecf-dd4c-45ab-9b50-2abe987d35d4"],"formats":[],"keywords":["vintage","regular","cube","anthonymattox","lands","heroic","spells","artifacts","historic","sacrifice","zombies","tokens","11 counters","legacy"],"dateLastUpdated":1765737404055,"defaultSorts":[],"cardCount":452,"description":"# Regular Cube\n\nA Cube for lovers of limited!\n\nRegular Cube is just good, clean Magic and it has no hard restrictions or gimmicks. The emphasis is on creature focused strategies with a mix of overlapping synergies.\n\nThe Cube is aimed to maximize the experience for both new and invested players. Cards are chosen to be as readable and understandable as possible, while maximizing strategic complexity and fun replayability. Card advantage and raw power are constrained. The name of the game is maximizing value.\n\nRead [the blog](\u002Fcube\u002Fblog\u002Fregular) with detailed updates for more insight into the history and design philosophy. Check out my [other cubes](\u002Fview\u002F5dc092ff7f2a8b2c173dab00) for other, less regular designs.\n\n---\n\n*Regular Cube is discussed occasionally on [Lucky Paper Radio](https:\u002F\u002Fluckypaper.co\u002Fpodcast) including an introduction to drafting it in [Episode 117](https:\u002F\u002Fluckypaper.co\u002Fpodcast\u002F117\u002F). It was also the subject of [Episode 35](https:\u002F\u002Fluckypaper.co\u002Fpodcast\u002F35) about grid drafting*\n\n*[Cube Con 2022 List](https:\u002F\u002Fcubecobra.com\u002Fcube\u002Foverview\u002F63bad68677557d2552c2d243)*\n\n*[Cube Con 2023 List](https:\u002F\u002Fcubecobra.com\u002Fcube\u002Foverview\u002Fregular-cc-2023)*\n\n---\n\n## Draft Guide\n\nRegular Cube plays similar to a \"Master's Set\" or a slightly more powerful and synergistic limited draft. It's intended to be accessible. Most cards have a reasonable floor, and the mana-cost curve is low. Drafting with a straightforward limited plan -- prioritizing interaction, card advantage, efficient creatures, and mana fixing -- within any two colors should result in a functional deck.\n\nMost successfully decks are two colors, frequently with a light splash, and take advantage of synergistic strategies. The list includes many themes of different sizes. Most are not large enough to fill up an entire deck. Optimizing multiple is the key to success. You may end up, for example, with a mixture of effects that care about [[heroic|Phalanx Leader]] and [[counters|Scurry Oak]], or [[zombies|Relentless Dead]] and [[sacrifice| Prist of Forgotten Gods]], or [[spells|Balmore, Battlmage Captain]] and [[card draw|Faerie Vandal]]. Many cards touch on multiple themes and themes tend to spill over into extra colors that leads to more variety in the way themes are expressed.\n\nThe environment tends to be quick! Be prepared for your opponents to put pressure on you in the first few turns of the game. Spells that cost [[5+ mana|Earl of Squirrel]] might not be the slam dunks they look like.\n\nMana fixing is asymmetrical around the color pie. It's faster and more efficient in the more proactive Red-White-Green color pairs. But slow fixing often comes with [[big|Azorious Chancery]] [[upsides|Raging Ravine]]. There are multiple copies of some [[generic|Ash Barrens]] [[fixing lands|Prismatic Vista]].\n\n\n### Draft Options\n\nThe cube is intended for and tested with standard 8 person drafts - 3 packs of 15. For flexibility, it's large enough for 10 players. It also works well and has been tested with 2 player grid drafts, 4 player drafts (4 packs of 11 or 5 packs of 9), and is great to [rotisserie drafts](https:\u002F\u002Fluckypaper.co\u002Farticles\u002Fcube-in-the-time-of-covid-with-rotisserie-draft\u002F).\n\n--- \n\n## Design Notes\n\n###### Goals and Motivations\n\nThe goal of this cube is to create as fun, deep, and repayable a limited environment as possible with interesting and interactive gameplay and draft. To create this depth, the cube offers an array of overlapping sets of synergistic cards and build arounds. Player's don't fall into drafting _the_ XY colored deck, but have opportunities to explore multiple directions. Decks will usually end up with multiple mechanical themes creating nuanced deck building. Cards that 'bridge' multiple strategies are prioritized as much as possible in order to fit more strategies while the same number of cards.\n\nCompared to most rarity-unrestricted cubes, the power level is drastically lowered. This might make it look less serious, just for kitchen table novices. But, I maintain there is nothing that makes casting a [[Lightning Bolt]] objectively more fun than than a [[Shock]] (except maybe nostalgia). At a lower power level we have tremendous flexibility in card choice that enables the kind of gameplay I'm looking for.  I approach designing this cube as trying to design and balance a limited format, not as an opportunity to play the most powerful cards the game has to offer. Tammys and Timmys, Jennys and Johnnys, and maybe especially Spikes should find something for them here.\n\nThe actual gameplay is closer to special set like Time Spiral or Modern Horizons, with the power level and complexity pushed further. Combat matters, tricks are good, it’s wise to be judicious with your removal, and it’s better to build toward a synergistic strategy than to just draft the 'best' cards.\n\nThere are no formal limitations on the cube’s design. All rarities and sets are allowed. I’ll break singleton if there’s a good reason to but will generally avoid functional duplicates. Modern era card design and color pie are prioritized. Uncommon power level is a baseline. There’s also not a fixed number of cards or a formal template for how they are distributed. The cube is maintained around 400 to 450 cards, enough for an 8 person draft with some variation. The extra padding makes adding and removing cards much easier.\n\nComplexity that doesn’t add to fun gameplay is avoided as much as possible. This means cards with trinket text, including effects that don’t play a role in this specific context, are avoided. For example [[Nebelgast Herald]] may be a powerful card even in a cube with no other spirits, but players will either expect a spirit theme or underrate it because not all of it's text matters. These comprehension hurdles cognitive space that could be used for something fun. On the other hand strategic complexity is pushed as much as possible to create a deep environment. This means simple effects that can do many things, on their own or combined with other cards, are prioritized. The goal is to make an environment as approachable to newer players (specifically targeting players with some degree of comfort at Premier set drafts), and also offers strategic depth to experienced players.\n\n###### Card Choices\n\nTwo foundational choices are prioritizing lands that ‘do stuff’ and being light handed with one mana spells. The lands let us add even more effects contributing to synergistic strategies and offer more complexity and novelty to board states. The parasitic suite of [[Jackal Pup]]s and other hyper-aggressive cards doesn’t fit with the maximum synergy \u002F complexity plan so are avoided. I think the inclusion of slow mana and adjusted mana curve hangs together pretty neatly. A big motivator for these and other card choices is also just to do something different from existing cubes in my playgroup.\n\nWhile overall reduced, I still want to support a range of speeds. The interplay between aggro, midrange, and control is almost as fundamental to the game as the color pie. Aggressive decks may lack the critical mass of hyper efficient cards compared to classic legacy cubes, but can still generate value from pressuring their opponent and generate reach with synergistic strategies. This power level even gives us a rare and exciting opportunity to explore two color aggro decks.\n\nThere is fast mana fixing in a few places. Aggressive decks still can’t afford to stumble, which makes good fixing critical if we’re trying to support two color decks. Aggressive pairs get faster fixing. There, I fixed it. There is also a healthy helping of [[Prismatic Vista]]. While a full suite of fetches and shocks takes up a lot of space I want to instead fill with land folks, I do like the interactions fetch lands have with landfall and deck manipulation. The Vistas fill that role while being less of a roulette in the draft. I had initially included a set of [[Evolving Wilds]], but discovered quickly there was not only a difference in power level, but also in gameplay. You were obligated to play and activate Evolving Wilds as soon as possible, meaning you couldn’t keep them in your hand to take advantage of any of those synergies they were supposed to be there for. So here we are with the biggest blight on my almost budget friendly cube.\n\nSo what about these synergies and bridge cards? The prime example is [[Weaponcraft Enthusiast]]. The effect is, on its face, a pretty simple choice between a 2\u002F3 or three tokens, but it may be effective in a deck for many reasons. It fits in a deck that needs bodies to sacrifice, cares about artifacts or +1\u002F+1 counters, is trying to abuse enter the battlefield effects, or maybe doing a bit of more than one of these. And, because of the targeted power level, if you don't draw any helpful interactions, a 2\u002F3 can still be part of a game of Magic.\n\nA mechanic like Heroic, which is fairly visible, might sound extremely narrow and parasitic, requiring two specific sets of cards to function. Practically speaking this is much more open ended and takes up much less space than may be expected. Only 5 cards actually include the heroic keyword. Flexible cards like [[Valorous Stance]] and [[Integrity \u002F\u002F Intervention]] mitigate the risk of playing combat tricks, divided damage spells like [[Arc Lightning]] are great on their own and pointing one damage at your [[Fabled Hero]] can turn a combat, and sometimes you even find a way to [[Dizzying Swoop]] your way to victory. Once you’re moving in this direction there are related mechanics that benefit from the same enablers. In a similar vein, there isn’t a large set of cards that specifically make up an artifact deck but a small number of payoffs can have a huge effect on your draft and game plan.\n\nThe most challenging aspect of this cube’s design has been discouraging “5 color nonsense”. A consequence of a slower format is allowing greedy decks playing the most powerful cards in isolation to be an optimal strategy. In trying to address this, aggressive strategies have become more supported, cards that generate lots of card advantage without building around them have largely been cut, and the power level has overall flattened.\n\n\n#### Budget Notes\n\nWhile this isn’t formally a budget cube, designing at a lower power level does have the side benefit of being relatively affordable. Even for an invested player, a cheap cube is much easier to comfortably toss into your bag as you head to your LGS.\n\nThe bulk of the value here is in the lands. The easiest way to cut down the budget further would be to swap them for cheaper alternatives and cut the list down to a tight 360. The zombie theme would be an easy cut with some surprisingly pricy payoffs. To me, the lands are worth while, and a big part of the environment, but I think it would still play with budget options.\n\n---\n\nIn the end it's just a regular cube: no gimmicks, no restrictions, just a lovingly crafted limited environment. If you want to talk cube, you can find me in the [MTG Cube Talk Discord](https:\u002F\u00
