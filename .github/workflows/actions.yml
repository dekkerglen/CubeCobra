name: CI Tests

# Pull request will trigger when PR is opened or updated, and more (https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#pull_request)
# Thus limit push checks to master branch so things run after the PR is merged. Without the limit multiple actions run on each PR
on:
  pull_request:
  push:
    branches:
      - 'master'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    if: github.repository == 'dekkerglen/CubeCobra'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          # To use with eslint script
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm install

      - name: Run linting (Prettier + ESLint)
        run: npm run lint:check

  test:
    if: github.repository == 'dekkerglen/CubeCobra'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test:ci

      - name: Save PR coverage
        if: github.event_name == 'pull_request'
        run: |
          if [ -f "packages/server/coverage/coverage-summary.json" ]; then
            cp packages/server/coverage/coverage-summary.json /tmp/coverage-pr.json
            echo "Saved PR coverage to /tmp"
          else
            echo "Warning: PR coverage file not found"
          fi

      - name: Switch to base branch and get base coverage
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          git reset --hard
          git clean -fd
          git checkout origin/${{ github.base_ref }}
          npm install
          npm run test:ci || echo "Base branch tests failed, will use zero baseline"
          if [ -f "packages/server/coverage/coverage-summary.json" ]; then
            cp packages/server/coverage/coverage-summary.json /tmp/coverage-base.json
            echo "Saved base coverage to /tmp"
          else
            echo '{"total":{"lines":{"pct":0},"statements":{"pct":0},"functions":{"pct":0},"branches":{"pct":0}}}' > /tmp/coverage-base.json
            echo "Base coverage not found, using zero baseline"
          fi

      - name: Restore coverage files for comparison
        if: github.event_name == 'pull_request'
        run: |
          cp /tmp/coverage-pr.json coverage-pr.json
          cp /tmp/coverage-base.json coverage-base.json
          echo "Restored coverage files from /tmp"

      - name: Upload Jest Coverage Report
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage
          path: packages/server/coverage

      - name: Generate Coverage Report with Delta
        if: github.event_name == 'pull_request'
        id: coverage
        run: |
          echo "Checking for coverage files..."
          ls -la coverage-*.json || echo "No coverage json files found"

          if [ ! -f "coverage-pr.json" ]; then
            echo "Error: coverage-pr.json not found"
            cat << 'EOF' > coverage-report.md
          ## 📊 Server Code Coverage Report

          ⚠️ Coverage data could not be generated for this PR. Please check the workflow logs.
          EOF
            exit 0
          fi

          echo "Found coverage-pr.json"
          PR_TOTAL=$(jq '.total' coverage-pr.json)
          PR_LINES=$(echo $PR_TOTAL | jq -r '.lines.pct')
          PR_LINES_COVERED=$(echo $PR_TOTAL | jq -r '.lines.covered')
          PR_LINES_TOTAL=$(echo $PR_TOTAL | jq -r '.lines.total')
          PR_STATEMENTS=$(echo $PR_TOTAL | jq -r '.statements.pct')
          PR_STATEMENTS_COVERED=$(echo $PR_TOTAL | jq -r '.statements.covered')
          PR_STATEMENTS_TOTAL=$(echo $PR_TOTAL | jq -r '.statements.total')
          PR_FUNCTIONS=$(echo $PR_TOTAL | jq -r '.functions.pct')
          PR_FUNCTIONS_COVERED=$(echo $PR_TOTAL | jq -r '.functions.covered')
          PR_FUNCTIONS_TOTAL=$(echo $PR_TOTAL | jq -r '.functions.total')
          PR_BRANCHES=$(echo $PR_TOTAL | jq -r '.branches.pct')
          PR_BRANCHES_COVERED=$(echo $PR_TOTAL | jq -r '.branches.covered')
          PR_BRANCHES_TOTAL=$(echo $PR_TOTAL | jq -r '.branches.total')

          if [ -f "coverage-base.json" ]; then
            BASE_TOTAL=$(jq '.total' coverage-base.json)
            BASE_LINES=$(echo $BASE_TOTAL | jq -r '.lines.pct')
            BASE_LINES_COVERED=$(echo $BASE_TOTAL | jq -r '.lines.covered')
            BASE_STATEMENTS=$(echo $BASE_TOTAL | jq -r '.statements.pct')
            BASE_STATEMENTS_COVERED=$(echo $BASE_TOTAL | jq -r '.statements.covered')
            BASE_FUNCTIONS=$(echo $BASE_TOTAL | jq -r '.functions.pct')
            BASE_FUNCTIONS_COVERED=$(echo $BASE_TOTAL | jq -r '.functions.covered')
            BASE_BRANCHES=$(echo $BASE_TOTAL | jq -r '.branches.pct')
            BASE_BRANCHES_COVERED=$(echo $BASE_TOTAL | jq -r '.branches.covered')
          else
            BASE_LINES=0
            BASE_LINES_COVERED=0
            BASE_STATEMENTS=0
            BASE_STATEMENTS_COVERED=0
            BASE_FUNCTIONS=0
            BASE_FUNCTIONS_COVERED=0
            BASE_BRANCHES=0
            BASE_BRANCHES_COVERED=0
          fi

          # Calculate deltas using awk
          LINES_DELTA=$(awk "BEGIN {printf \"%.2f\", $PR_LINES - $BASE_LINES}")
          LINES_COUNT_DELTA=$(awk "BEGIN {printf \"%d\", $PR_LINES_COVERED - $BASE_LINES_COVERED}")
          STATEMENTS_DELTA=$(awk "BEGIN {printf \"%.2f\", $PR_STATEMENTS - $BASE_STATEMENTS}")
          STATEMENTS_COUNT_DELTA=$(awk "BEGIN {printf \"%d\", $PR_STATEMENTS_COVERED - $BASE_STATEMENTS_COVERED}")
          FUNCTIONS_DELTA=$(awk "BEGIN {printf \"%.2f\", $PR_FUNCTIONS - $BASE_FUNCTIONS}")
          FUNCTIONS_COUNT_DELTA=$(awk "BEGIN {printf \"%d\", $PR_FUNCTIONS_COVERED - $BASE_FUNCTIONS_COVERED}")
          BRANCHES_DELTA=$(awk "BEGIN {printf \"%.2f\", $PR_BRANCHES - $BASE_BRANCHES}")
          BRANCHES_COUNT_DELTA=$(awk "BEGIN {printf \"%d\", $PR_BRANCHES_COVERED - $BASE_BRANCHES_COVERED}")

          # Format delta with + sign for positive values
          format_delta() {
            if [ $(echo "$1 >= 0" | awk '{print ($1 >= 0)}') -eq 1 ]; then
              echo "+$1"
            else
              echo "$1"
            fi
          }

          LINES_DELTA_FMT=$(format_delta "$LINES_DELTA")
          LINES_COUNT_DELTA_FMT=$(format_delta "$LINES_COUNT_DELTA")
          STATEMENTS_DELTA_FMT=$(format_delta "$STATEMENTS_DELTA")
          STATEMENTS_COUNT_DELTA_FMT=$(format_delta "$STATEMENTS_COUNT_DELTA")
          FUNCTIONS_DELTA_FMT=$(format_delta "$FUNCTIONS_DELTA")
          FUNCTIONS_COUNT_DELTA_FMT=$(format_delta "$FUNCTIONS_COUNT_DELTA")
          BRANCHES_DELTA_FMT=$(format_delta "$BRANCHES_DELTA")
          BRANCHES_COUNT_DELTA_FMT=$(format_delta "$BRANCHES_COUNT_DELTA")

          cat << 'EOF' > coverage-report.md
          ## 📊 Server Code Coverage Report

          | Metric | Coverage % | Coverage Raw | Delta % | Delta Raw |
          |--------|------------|--------------|---------|-----------|
          EOF

          echo "| Lines | ${PR_LINES}% | ${PR_LINES_COVERED}/${PR_LINES_TOTAL} | ${LINES_DELTA_FMT}% | ${LINES_COUNT_DELTA_FMT} |" >> coverage-report.md
          echo "| Statements | ${PR_STATEMENTS}% | ${PR_STATEMENTS_COVERED}/${PR_STATEMENTS_TOTAL} | ${STATEMENTS_DELTA_FMT}% | ${STATEMENTS_COUNT_DELTA_FMT} |" >> coverage-report.md
          echo "| Functions | ${PR_FUNCTIONS}% | ${PR_FUNCTIONS_COVERED}/${PR_FUNCTIONS_TOTAL} | ${FUNCTIONS_DELTA_FMT}% | ${FUNCTIONS_COUNT_DELTA_FMT} |" >> coverage-report.md
          echo "| Branches | ${PR_BRANCHES}% | ${PR_BRANCHES_COVERED}/${PR_BRANCHES_TOTAL} | ${BRANCHES_DELTA_FMT}% | ${BRANCHES_COUNT_DELTA_FMT} |" >> coverage-report.md

          cat coverage-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report for PR comment
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report.md
          retention-days: 1

      - name: Save PR number
        if: github.event_name == 'pull_request'
        run: echo ${{ github.event.pull_request.number }} > pr-number.txt

      - name: Upload PR number
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: pr-number.txt
          retention-days: 1
